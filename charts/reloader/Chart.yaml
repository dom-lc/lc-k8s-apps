# Chart .yaml file for a Helm chart
# This file contains metadata about the chart, such as its name, version, and description.
# It also specifies the dependencies of the chart, which are other charts that this chart depends on.
# The dependencies are specified in the `dependencies` section, where each dependency is defined by its name, version, and repository URL.
apiVersion: v2
name: reloader
version: 0.1.0
appVersion: 1.0.0
description: Chart
# This defines the chart's your chart depends on.
dependencies:
 - name: reloader
   version: 2.1.3
   repository:  https://stakater.github.io/stakater-charts