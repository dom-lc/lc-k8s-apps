name: Render Helm Template

on:
  workflow_dispatch: {} # optional manual trigger

jobs:
  helm-template:
    runs-on: surveillance-hosted-k8sapps-deploy

    steps:
      - name: Checkout lc-k8s-apps (this repo)
        uses: actions/checkout@v4

      - name: Checkout lc-k8s-infra (contains chart)
        uses: actions/checkout@v4
        with:
          repository: dom-lc/lc-k8s-infra
          path: lc-k8s-infra

      # - name: Setup kubectl
      #   uses: azure/setup-kubectl@v3
      #   with:
      #     version: 'latest'  # or specify a version like 'v1.26.0'

      # - name: Sudo it
      #   run: |
      #     echo "runner:x:1001:1001::/home/runner:/bin/bash" >> /etc/passwd
    

      

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0  # or latest version

      - name: Install kubectl locally
        run: |
          curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl  # or just ./kubectl and reference it with ./kubectl

      - name: Run helm template
        run: |
          helm template app-management \
            ./lc-k8s-infra/charts/app-management \
            -f ./charts/reloader/surveillance-green.yaml 

      - name: Deploy with kubectl
        run: |
          helm template app-management \
            ./lc-k8s-infra/charts/app-management \
            -f ./charts/reloader/surveillance-green.yaml | ./kubectl apply -n argocd -f - 

